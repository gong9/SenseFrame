name: Release Desktop Apps

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            command: pnpm run dist:mac
          - platform: win
            os: windows-latest
            command: pnpm run dist:win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Prepare DMG builder
        if: matrix.platform == 'mac'
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          if [ "$arch" = "arm64" ]; then
            bundle_arch="arm64"
          else
            bundle_arch="x86_64"
          fi

          mkdir -p "$RUNNER_TEMP/dmgbuild"
          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/dmgbuild.tar.gz" \
            "https://github.com/electron-userland/electron-builder-binaries/releases/download/dmg-builder@1.2.0/dmgbuild-bundle-${bundle_arch}-75c8a6c.tar.gz"
          tar -xzf "$RUNNER_TEMP/dmgbuild.tar.gz" -C "$RUNNER_TEMP/dmgbuild" --strip-components=1
          test -x "$RUNNER_TEMP/dmgbuild/dmgbuild"
          echo "CUSTOM_DMGBUILD_PATH=$RUNNER_TEMP/dmgbuild/dmgbuild" >> "$GITHUB_ENV"

      - name: Build installer
        run: ${{ matrix.command }}
        env:
          NPM_CONFIG_ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: senseframe-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: error

  github-release:
    name: Upload GitHub Release draft
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${files[@]}" \
              --draft \
              --title "SenseFrame ${TAG_NAME}" \
              --notes "SenseFrame desktop installers."
          fi
